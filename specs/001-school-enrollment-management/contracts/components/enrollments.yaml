schemas:
  StudentIdentityInput:
    type: object
    additionalProperties: false
    required: [documentType, documentNumber, firstNames, lastNames, birthDate]
    properties:
      documentType:
        type: string
        minLength: 1
        maxLength: 20
        example: DNI
      documentNumber:
        type: string
        minLength: 1
        maxLength: 32
        example: 99.001.101
      firstNames:
        type: string
        minLength: 1
        maxLength: 120
        example: Ana María
      lastNames:
        type: string
        minLength: 1
        maxLength: 120
        example: Solís
      birthDate:
        type: string
        format: date
        example: '2018-07-10'
  CreateEnrollmentRequest:
    type: object
    additionalProperties: false
    required: [student, schoolId, academicYearId, gradeId, classGroupId]
    properties:
      student: { $ref: '#/schemas/StudentIdentityInput' }
      schoolId: { type: integer, format: int32, minimum: 1, example: 1 }
      academicYearId: { type: integer, format: int32, minimum: 1, example: 2 }
      gradeId: { type: integer, format: int32, minimum: 1, example: 1 }
      classGroupId: { type: integer, format: int32, minimum: 1, example: 10 }
  EnrollmentListItem:
    type: object
    additionalProperties: false
    required:
      - enrollmentId
      - studentId
      - documentType
      - documentNumber
      - firstNames
      - lastNames
      - birthDate
      - age
      - school
      - academicYear
      - grade
      - classGroup
    properties:
      enrollmentId: { type: integer, format: int32, example: 100 }
      studentId: { type: integer, format: int32, example: 50 }
      documentType: { type: string, example: DNI }
      documentNumber: { type: string, example: 99.001.101 }
      firstNames: { type: string, example: Ana María }
      lastNames: { type: string, example: Solís }
      birthDate: { type: string, format: date, example: '2018-07-10' }
      age: { type: integer, minimum: 0, example: 8 }
      school: { $ref: ./catalogs.yaml#/schemas/SchoolSummary }
      academicYear: { $ref: ./catalogs.yaml#/schemas/AcademicYearSummary }
      grade: { $ref: ./catalogs.yaml#/schemas/GradeSummary }
      classGroup: { $ref: ./catalogs.yaml#/schemas/ClassGroupSummary }
  CreateEnrollmentResponse:
    type: object
    additionalProperties: false
    required:
      - enrollmentId
      - studentId
      - studentReused
      - documentType
      - documentNumber
      - firstNames
      - lastNames
      - birthDate
      - age
      - school
      - academicYear
      - grade
      - classGroup
    properties:
      enrollmentId: { type: integer, format: int32, example: 100 }
      studentId: { type: integer, format: int32, example: 50 }
      studentReused:
        type: boolean
        description: Indica si la identidad ya existía y fue reutilizada.
        example: false
      documentType: { type: string, example: DNI }
      documentNumber: { type: string, example: 99.001.101 }
      firstNames: { type: string, example: Ana María }
      lastNames: { type: string, example: Solís }
      birthDate: { type: string, format: date, example: '2018-07-10' }
      age: { type: integer, minimum: 0, example: 8 }
      school: { $ref: ./catalogs.yaml#/schemas/SchoolSummary }
      academicYear: { $ref: ./catalogs.yaml#/schemas/AcademicYearSummary }
      grade: { $ref: ./catalogs.yaml#/schemas/GradeSummary }
      classGroup: { $ref: ./catalogs.yaml#/schemas/ClassGroupSummary }
  HistoryTeachingAssignment:
    type: object
    additionalProperties: false
    required: [assignmentId, teacher, subject, weekdays]
    properties:
      assignmentId: { type: integer, format: int32, example: 31 }
      teacher: { $ref: ./catalogs.yaml#/schemas/TeacherSummary }
      subject: { $ref: ./catalogs.yaml#/schemas/SubjectSummary }
      weekdays:
        type: array
        minItems: 1
        items: { type: integer, minimum: 1, maximum: 7 }
        example: [1, 3, 5]
  EnrollmentHistoryItem:
    type: object
    additionalProperties: false
    required: [enrollmentId, academicYear, school, grade, classGroup, teachingAssignments]
    properties:
      enrollmentId: { type: integer, format: int32, example: 100 }
      academicYear: { $ref: ./catalogs.yaml#/schemas/AcademicYearSummary }
      school: { $ref: ./catalogs.yaml#/schemas/SchoolSummary }
      grade: { $ref: ./catalogs.yaml#/schemas/GradeSummary }
      classGroup: { $ref: ./catalogs.yaml#/schemas/ClassGroupSummary }
      teachingAssignments:
        type: array
        description: Orden ascendente por subject.name, teacher.lastNames, teacher.firstNames y assignmentId.
        items: { $ref: '#/schemas/HistoryTeachingAssignment' }
  StudentHistoryResponse:
    type: object
    additionalProperties: false
    required: [studentId, documentType, documentNumber, firstNames, lastNames, birthDate, enrollments]
    properties:
      studentId: { type: integer, format: int32, example: 50 }
      documentType: { type: string, example: DNI }
      documentNumber: { type: string, example: 99.001.101 }
      firstNames: { type: string, example: Ana María }
      lastNames: { type: string, example: Solís }
      birthDate: { type: string, format: date, example: '2018-07-10' }
      enrollments:
        type: array
        description: Orden descendente por academicYear.startDate y luego ascendente por enrollmentId.
        items: { $ref: '#/schemas/EnrollmentHistoryItem' }
