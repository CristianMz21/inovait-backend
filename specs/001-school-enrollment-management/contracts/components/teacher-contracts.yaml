schemas:
  CreateTeacherContractsRequest:
    type: object
    additionalProperties: false
    required: [schoolIds, startDate]
    properties:
      schoolIds:
        type: array
        minItems: 1
        items: { type: integer, format: int32, minimum: 1 }
        description: IDs repetidos son un conflicto de aplicación 409 para la solicitud atómica.
        example: [1, 2]
      startDate: { type: string, format: date, example: '2026-03-01' }
      endDate: { type: [string, "null"], format: date, example: null }
  TeacherContractResponse:
    type: object
    additionalProperties: false
    required:
      - id
      - teacherId
      - school
      - startDate
      - endDate
      - persistedStatus
      - effectiveStatus
      - evaluatedAt
    properties:
      id: { type: integer, format: int32, example: 20 }
      teacherId: { type: integer, format: int32, example: 5 }
      school: { $ref: ./catalogs.yaml#/schemas/SchoolSummary }
      startDate: { type: string, format: date, example: '2026-03-01' }
      endDate: { type: [string, "null"], format: date, example: null }
      persistedStatus:
        type: string
        enum: [Confirmed, Cancelled]
        example: Confirmed
      effectiveStatus:
        type: string
        enum: [Upcoming, Effective, Expired, Cancelled]
        example: Effective
      evaluatedAt: { type: string, format: date, example: '2026-07-10' }
